name: Signed Windows release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:

permissions:
  actions: read
  contents: write

jobs:
  release:
    runs-on: windows-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      SIGNPATH_ORGANIZATION_ID: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
      SIGNPATH_PROJECT_SLUG: ${{ vars.SIGNPATH_PROJECT_SLUG }}
      SIGNPATH_SIGNING_POLICY_SLUG: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG }}
      SIGNPATH_APPLICATION_ARTIFACT_CONFIGURATION_SLUG: ${{ vars.SIGNPATH_APPLICATION_ARTIFACT_CONFIGURATION_SLUG }}
      SIGNPATH_RELEASE_ARTIFACT_CONFIGURATION_SLUG: ${{ vars.SIGNPATH_RELEASE_ARTIFACT_CONFIGURATION_SLUG }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate release configuration
        shell: pwsh
        env:
          SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
        run: |
          if (-not $env:SIGNPATH_API_TOKEN) { throw "SIGNPATH_API_TOKEN secret is not configured." }
          $required = @(
            "SIGNPATH_ORGANIZATION_ID",
            "SIGNPATH_PROJECT_SLUG",
            "SIGNPATH_SIGNING_POLICY_SLUG",
            "SIGNPATH_APPLICATION_ARTIFACT_CONFIGURATION_SLUG",
            "SIGNPATH_RELEASE_ARTIFACT_CONFIGURATION_SLUG"
          )
          foreach ($name in $required) {
            if (-not (Get-Item "env:$name").Value) { throw "$name repository variable is not configured." }
          }
          $version = (Get-Content desktop/package.json | ConvertFrom-Json).version
          if ("${{ github.ref_type }}" -ne "tag") {
            throw "Run this workflow from the existing v$version tag, not from a branch."
          }
          if ("${{ github.ref_name }}" -ne "v$version") {
            throw "Tag ${{ github.ref_name }} does not match desktop package version v$version."
          }
          "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install -r requirements.txt
          npm ci --prefix desktop

      - name: Build unsigned unpacked application
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File build_backend.ps1
          npm run build:renderer --prefix desktop
          npx --prefix desktop electron-builder --dir --win --x64 --config.win.signAndEditExecutable=true

      - name: Upload unsigned application
        id: upload-unsigned-application
        uses: actions/upload-artifact@v7
        with:
          name: unsigned-application
          path: artifacts/desktop/win-unpacked
          if-no-files-found: error

      - name: Sign application executables
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ env.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ env.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ env.SIGNPATH_SIGNING_POLICY_SLUG }}
          artifact-configuration-slug: ${{ env.SIGNPATH_APPLICATION_ARTIFACT_CONFIGURATION_SLUG }}
          github-artifact-id: ${{ steps.upload-unsigned-application.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signed-application
          parameters: |
            version: "${{ env.VERSION }}"

      - name: Build unsigned installers from signed application
        shell: pwsh
        run: |
          if (-not (Test-Path "signed-application/Hoya Agent.exe")) { throw "Signed application output has an unexpected layout." }
          npx --prefix desktop electron-builder --win nsis portable squirrel --x64 --prepackaged signed-application --publish never --config.win.signAndEditExecutable=true

      - name: Upload unsigned release executables
        id: upload-unsigned-release
        uses: actions/upload-artifact@v7
        with:
          name: unsigned-release
          path: |
            artifacts/desktop/Hoya-Agent-Setup-${{ env.VERSION }}-x64.exe
            artifacts/desktop/Hoya-Agent-Portable-${{ env.VERSION }}-x64.exe
            artifacts/desktop/squirrel-windows/Hoya-Agent-${{ env.VERSION }}-win32-x64-Setup.exe
          if-no-files-found: error

      - name: Sign release executables
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ env.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ env.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ env.SIGNPATH_SIGNING_POLICY_SLUG }}
          artifact-configuration-slug: ${{ env.SIGNPATH_RELEASE_ARTIFACT_CONFIGURATION_SLUG }}
          github-artifact-id: ${{ steps.upload-unsigned-release.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signed-release
          parameters: |
            version: "${{ env.VERSION }}"

      - name: Rebuild updater metadata and verify signatures
        shell: pwsh
        run: |
          $setup = "signed-release/Hoya-Agent-Setup-$env:VERSION-x64.exe"
          $portable = "signed-release/Hoya-Agent-Portable-$env:VERSION-x64.exe"
          $squirrelSetup = "signed-release/squirrel-windows/Hoya-Agent-$env:VERSION-win32-x64-Setup.exe"
          node desktop/scripts/rebuild-update-metadata.cjs $setup "signed-release/latest.yml"
          foreach ($file in @($setup, $portable, $squirrelSetup)) {
            $signature = Get-AuthenticodeSignature $file
            if ($signature.Status -ne "Valid") { throw "$file signature is $($signature.Status): $($signature.StatusMessage)" }
          }

      - name: Publish signed GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $assets = @(
            "signed-release/Hoya-Agent-Setup-$env:VERSION-x64.exe",
            "signed-release/Hoya-Agent-Setup-$env:VERSION-x64.exe.blockmap",
            "signed-release/Hoya-Agent-Portable-$env:VERSION-x64.exe",
            "signed-release/latest.yml",
            "signed-release/squirrel-windows/Hoya-Agent-$env:VERSION-win32-x64-Setup.exe",
            "artifacts/desktop/squirrel-windows/HoyaAgent-$env:VERSION-full.nupkg",
            "artifacts/desktop/squirrel-windows/RELEASES"
          )
          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $assets --clobber
          } else {
            gh release create $tag $assets --verify-tag --generate-notes --title "Hoya Agent $env:VERSION"
          }

      - name: Verify Electron public update feed
        shell: pwsh
        run: |
          $feed = "https://update.electronjs.org/lihongyao517/Hoya_agent/win32-x64/$env:VERSION/RELEASES"
          for ($attempt = 1; $attempt -le 20; $attempt++) {
            try {
              $response = Invoke-WebRequest -Uri $feed -Headers @{ "User-Agent" = "Hoya-Agent-release-check/$env:VERSION" }
              if ($response.StatusCode -eq 200 -and $response.Content -match "HoyaAgent-$([regex]::Escape($env:VERSION))-full\.nupkg") {
                Write-Host "Electron public update feed is ready: $feed"
                exit 0
              }
            } catch {
              Write-Host "Feed attempt $attempt is not ready: $($_.Exception.Message)"
            }
            Start-Sleep -Seconds 15
          }
          throw "Electron public update feed did not expose version $env:VERSION within five minutes: $feed"
